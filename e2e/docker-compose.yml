services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: switchboard
      MINIO_ROOT_PASSWORD: switchboard-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        mc alias set local http://minio:9000 switchboard switchboard-secret
        mc mb --ignore-existing local/switchboard-test

  backend:
    image: python:3.13-alpine
    working_dir: /app
    volumes:
      - ./backend:/app:ro
    command: ["python", "server.py"]

  caddy:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
      backend:
        condition: service_started
    environment:
      SWITCHBOARD_S3_ENDPOINT: minio:9000
      SWITCHBOARD_S3_ACCESS_KEY: switchboard
      SWITCHBOARD_S3_SECRET_KEY: switchboard-secret
      SWITCHBOARD_S3_BUCKET: switchboard-test
      SWITCHBOARD_S3_INSECURE: "true"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "8080:8080"
