name: Caddy Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  actions: write
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ethndotsh/switchboard-caddy

jobs:
  build:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:build-${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            SWITCHBOARD_REPLACE=/src
          cache-from: type=gha,scope=caddy-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=caddy-${{ matrix.suffix }}

  publish:
    name: Publish multi-arch manifest
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and publish manifest
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=""
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              tag_args="$tag_args -t $tag"
            fi
          done <<EOF
          $META_TAGS
          EOF

          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args \
            "${IMAGE_NAME}:build-${GITHUB_SHA}-amd64" \
            "${IMAGE_NAME}:build-${GITHUB_SHA}-arm64"
