schema: switchboard.tests/v1
cases:
  - name: allowlisted client passes through
    request:
      path: /
      client_ip: 203.0.113.7
    expect:
      action: next
      reason: allowlisted

  - name: another allowlisted client passes through
    request:
      path: /admin
      client_ip: 192.0.2.10
    expect:
      action: next
      reason: allowlisted

  - name: unknown client is denied
    request:
      path: /
      client_ip: 10.0.0.5
    expect:
      action: deny
      status: 403
      reason: not-allowlisted

  - name: empty client ip is denied
    request:
      path: /
    expect:
      action: deny
      status: 403
      reason: not-allowlisted
